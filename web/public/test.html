<!DOCTYPE html>
<html>
<head>
  <title>MiniChat Test</title>
</head>
<body>
  <h1>MiniChat - Enterprise AI Chatbot</h1>
  <div id="login">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email" value="jithendranaidunara@gmail.com">
    <input type="password" id="password" placeholder="Password" value="Jithendra10@">
    <button onclick="login()">Sign In</button>
    <div id="error"></div>
  </div>
  <div id="chat" style="display:none">
    <h2>Chat</h2>
    <div id="messages"></div>
    <input type="text" id="message" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
    <button onclick="logout()">Logout</button>
  </div>

  <script>
    const API_URL = 'https://chatbot-enterprise-api.vercel.app/api';
    let token = localStorage.getItem('token');

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (data.success) {
          token = data.token;
          localStorage.setItem('token', token);
          document.getElementById('login').style.display = 'none';
          document.getElementById('chat').style.display = 'block';
          loadConversations();
        } else {
          errorDiv.textContent = data.error || 'Login failed';
        }
      } catch (e) {
        errorDiv.textContent = 'Error: ' + e.message;
      }
    }

    async function loadConversations() {
      try {
        const res = await fetch(`${API_URL}/conversations`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        console.log('Conversations:', data);
      } catch (e) {
        console.error('Error:', e);
      }
    }

    async function sendMessage() {
      const content = document.getElementById('message').value;
      document.getElementById('message').value = '';

      const div = document.createElement('div');
      div.textContent = 'You: ' + content;
      document.getElementById('messages').appendChild(div);

      try {
        const res = await fetch(`${API_URL}/chat/message`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ conversationId: 'test', content })
        });
        const data = await res.json();

        const reply = document.createElement('div');
        reply.textContent = 'AI: ' + (data.assistantMessage?.content || 'No response');
        document.getElementById('messages').appendChild(reply);
      } catch (e) {
        console.error('Error:', e);
      }
    }

    function logout() {
      localStorage.removeItem('token');
      document.getElementById('login').style.display = 'block';
      document.getElementById('chat').style.display = 'none';
    }

    // Auto-login if token exists
    if (token) {
      document.getElementById('login').style.display = 'none';
      document.getElementById('chat').style.display = 'block';
      loadConversations();
    }
  </script>
</body>
</html>
